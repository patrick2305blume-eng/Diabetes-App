<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPE Rechner</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #f1c40f; }
        .back-link { text-decoration: none; color: #5dade2; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        h2 { color: #f1c40f; margin-top: 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .result-box { margin-top: 20px; padding: 15px; background: #f1c40f22; border: 1px solid #f1c40f; border-radius: 10px; }
        .disclaimer { font-size: 11px; color: #888; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Zurück</a>
        <h2>🥩 FPE Rechner</h2>
        <label>Fett in g:</label>
        <input type="number" id="fett" oninput="calcFPE()">
        <label>Eiweiß in g:</label>
        <input type="number" id="ew" oninput="calcFPE()">
        
        <div id="res" class="result-box" style="display:none;">
            <div style="font-size: 20px; font-weight: bold; color: #f1c40f;">Ergebnis: <span id="fpeVal"></span> FPE</div>
            <div id="time" style="margin-top:10px; font-size: 14px;"></div>
        </div>
        
        <div class="disclaimer">
            Empfehlung: 1 FPE entspricht ca. der Insulinmenge von 1 BE/KE, jedoch stark verzögert abgegeben.
        </div>
    </div>
    <script>
        function calcFPE() {
            const f = parseFloat(document.getElementById('fett').value) || 0;
            const e = parseFloat(document.getElementById('ew').value) || 0;
            const kcal = (f * 9) + (e * 4);
            const fpe = kcal / 100;
            
            if (fpe > 0) {
                document.getElementById('res').style.display = "block";
                document.getElementById('fpeVal').innerText = fpe.toFixed(1);
                let hours = fpe <= 1 ? 3 : (fpe <= 2 ? 4 : (fpe <= 3 ? 5 : 8));
                document.getElementById('time').innerText = "Verzögerungsempfehlung: " + hours + " Stunden.";
            }
        }
    </script>
</body>
</html>
