<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortison-Schema</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #f39c12; }
        .back-link { text-decoration: none; color: #5dade2; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        h2 { color: #f39c12; margin-top: 0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .result-box { margin-top: 20px; padding: 15px; background: #f39c1222; border: 1px solid #f39c12; border-radius: 10px; display: none; }
        .warning { background: #441a1a; border: 1px solid #e74c3c; padding: 15px; border-radius: 8px; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Zurück</a>
        <h2>💊 Cortison-Schema</h2>
        <label>Tagesdosis (TDD) in IE:</label><input type="number" id="tdd" oninput="calcTeupe()">
        <label>Prednisolon (mg):</label><input type="number" id="mg" oninput="calcTeupe()">
        <div id="result" class="result-box"></div>
        <div class="warning"><strong>Wichtig:</strong> Start 3h nach Cortison! Nur nach Absprache mit dem Arzt.</div>
    </div>
    <script>
        function calcTeupe() {
            const tdd = parseFloat(document.getElementById('tdd').value) || 0;
            const mg = parseFloat(document.getElementById('mg').value) || 0;
            const res = document.getElementById('result');
            if (tdd > 0 && mg >= 5) {
                res.style.display = "block";
                let proz = mg <= 30 ? 0.2 : (mg <= 40 ? 0.3 : (mg <= 60 ? 0.4 : 0.5));
                const extra = tdd * proz;
                res.innerHTML = `<strong>Zusatz-Insulin: +${extra.toFixed(1)} IE</strong><br><small>Verteilung (ICT): 60% / 25% / 15%</small>`;
            } else { res.style.display = "none"; }
        }
    </script>
</body>
</html>
