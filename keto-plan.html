<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketoazidose-Plan</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #e74c3c; }
        .back-link { text-decoration: none; color: #5dade2; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        h2 { color: #e74c3c; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #aaa; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #e74c3c; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.5; }
        .warning { background: #441a1a; border: 1px solid #e74c3c; }
        .disclaimer { font-size: 11px; color: #888; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Zurück</a>
        <h2>⚠️ Ketoazidose-Plan</h2>
        
        <div class="input-group">
            <label>Aktueller Blutzucker (mg/dl):</label>
            <input type="number" id="bz" placeholder="z.B. 260">
        </div>

        <div class="input-group">
            <label>Aceton / Ketone im Blut (mmol/l):</label>
            <input type="number" step="0.1" id="keton" placeholder="z.B. 1.6">
        </div>

        <button class="btn" onclick="checkKeto()">Anweisungen zeigen</button>

        <div id="result" class="result-box warning">
            <div id="output"></div>
        </div>

        <div class="disclaimer">
            Dies ist ein Notfall-Schema zur Orientierung. Besprechen Sie dieses Vorgehen unbedingt vorab mit Ihrem Arzt. Bei Erbrechen oder Atemnot sofort 112 rufen!
        </div>
    </div>

    <script>
        function checkKeto() {
            const bz = parseFloat(document.getElementById('bz').value);
            const keton = parseFloat(document.getElementById('keton').value);
            const res = document.getElementById('result');
            const out = document.getElementById('output');

            if (bz > 250) {
                res.style.display = "block";
                if (keton >= 1.5) {
                    out.innerHTML = "<strong>GEFAHR (Starke Ketose):</strong><ul><li><b>DOPPELTES</b> Korrektur-Insulin mit Pen/Spritze!</li><li>Viel trinken (0,5-1l Wasser/Std).</li><li>Nicht einschlafen & keine körperliche Aktivität!</li><li>Kathetermaterial wechseln.</li><li>Sofort Arzt/Klinik kontaktieren!</li></ul>";
                } else if (keton > 0.6) {
                    out.innerHTML = "<strong>Ketose bestätigt:</strong><ul><li>Einfaches Korrektur-Insulin laut Plan mit Pen/Spritze.</li><li>Viel trinken & Katheter wechseln.</li><li>Kontrolle nach 1 Std.</li></ul>";
                } else {
                    out.innerHTML = "Blutzucker hoch, aber Keton-Test negativ. Korrektur laut Plan und Ursache (Katheter?) prüfen.";
                }
            } else {
                alert("Werte im Normbereich oder nur leicht erhöht. Keton-Schema erst ab ca. 250 mg/dl.");
            }
        }
    </script>
</body>
</html>
