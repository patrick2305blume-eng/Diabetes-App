<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HbA1c & GMI Rechner</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #2ecc71; }
        .back-link { text-decoration: none; color: #5dade2; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        h2 { color: #2ecc71; margin-top: 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        .result-box { margin-top: 20px; padding: 20px; background: #2ecc7122; border: 1px solid #2ecc71; border-radius: 10px; text-align: center; }
        .val { font-size: 32px; font-weight: bold; color: #2ecc71; }
        .disclaimer { font-size: 11px; color: #888; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Zurück</a>
        <h2>🔄 HbA1c & GMI Rechner</h2>
        <label>Durchschnitts-Blutzucker (mg/dl):</label>
        <input type="number" id="avgBz" oninput="calcHb()" placeholder="z.B. 140">
        
        <div class="result-box">
            <div>Geschätzter HbA1c:</div>
            <div id="hba1c" class="val">-- %</div>
            <div style="margin-top: 10px; font-size: 14px; color: #aaa;">GMI (Formel-basiert): <span id="gmi">--</span>%</div>
        </div>
        
        <div class="disclaimer">
            Dies sind rein mathematische Schätzwerte. Der reale Laborwert kann abweichen. Nur zur Orientierung.
        </div>
    </div>
    <script>
        function calcHb() {
            const avg = parseFloat(document.getElementById('avgBz').value);
            if (avg > 50) {
                const hba1c = (avg + 46.7) / 28.7;
                const gmi = 3.31 + (0.02392 * avg);
                document.getElementById('hba1c').innerText = hba1c.toFixed(1) + " %";
                document.getElementById('gmi').innerText = gmi.toFixed(1);
            }
        }
    </script>
</body>
</html>
